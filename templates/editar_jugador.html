{% extends "base.html" %}

{% block content %}

<h2>Editar Jugador</h2>

<form action="{{ url_for('editar_jugador', id=jugador.id) }}" method="POST">

    <label>Nombre</label><br>
    <input type="text" name="nombre" value="{{ jugador.nombre }}" required>

    <br><br>

    <label>Nickname</label><br>
    <input type="text" name="nickname" value="{{ jugador.nickname }}" required>

    <br><br>

    <button type="submit">Actualizar</button>
    <a href="{{ url_for('jugadores') }}">Cancelar</a>

</form>

{% endblock %}
