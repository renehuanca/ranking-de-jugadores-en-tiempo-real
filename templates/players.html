{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 mb-0">Gestión de Jugadores</h2>
    <a href="/players/add" class="btn btn-primary">
        <i class="bi bi-person-plus"></i> + Agregar Jugador
    </a>
</div>

<div class="table-responsive">
    <table class="table align-middle">
        <thead class="table-light">
            <tr>
                <th scope="col" style="width: 80px;">ID</th>
                <th scope="col">Nombre Real</th>
                <th scope="col">Nickname</th>
                <th scope="col" class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in players %}
            <tr>
                <th scope="row" class="text-muted">{{ p.id }}</th>
                <td>{{ p.name }}</td>
                <td>
                    <span class="badge bg-secondary text-uppercase">{{ p.nickname }}</span>
                </td>
                <td class="text-end">
                    <a href="/score/{{ p.nickname }}" class="btn btn-sm btn-success me-1">
                       + 
                    </a>
                    <a href="/players/edit/{{ p.id }}" class="btn btn-sm btn-outline-dark me-1">
                        Editar
                    </a>
                    <a href="/players/delete/{{ p.id }}" 
                       class="btn btn-sm btn-outline-danger" 
                       onclick="return confirm('¿Estás seguro de eliminar a este jugador?')">
                        Eliminar
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">
                    No hay jugadores registrados todavía.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
