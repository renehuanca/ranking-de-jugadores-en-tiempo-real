{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 mb-0">Agregar puntaje</h2>
</div>

<div class="table-responsive">
    <table class="table align-middle">
        <thead class="table-light">
            <tr>
                <th scope="col" style="width: 80px;">ID</th>
                <th scope="col">Nombre Real</th>
                <th scope="col">Nickname</th>
                <th scope="col" class="text-end">Acciones</th>
            </tr>
        </thead>
        <tbody>
            {% for p in jugadores %}
            <tr>
                <th scope="row" class="text-muted">{{ p.id }}</th>
                <td>{{ p.nombre }}</td>
                <td>
                    <span class="badge bg-secondary text-uppercase">{{ p.nickname }}</span>
                </td>
                <td class="text-end">
                    <a href="{{ url_for('puntaje', nickname=p.nickname) }}" class="btn btn-sm btn-success me-1">
                       +1 punto
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center py-4 text-muted">
                    No hay jugadores registrados todavía.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
